<div class="page">
  <div class="page-header">
    <input class="search-input" type="search" placeholder="Artists, songs, albums…"
      [value]="query()" (input)="onSearch($event)" autofocus />
  </div>

  <div class="page-scroll">
    @if (!query()) {
      <div class="hint"><p>Search your library</p></div>
    } @else if (results().length === 0) {
      <div class="hint"><p>No results for "{{ query() }}"</p></div>
    } @else {
      @for (track of results(); track track.id) {
        <div class="result-item">
          <div class="result-art">
            @if (track.artworkUri) { <img [src]="track.artworkUri" [alt]="track.album" /> }
          </div>
          <div class="result-info">
            <p class="result-title">{{ track.title }}</p>
            <p class="result-sub">{{ track.artist }} · {{ track.album }}</p>
          </div>
        </div>
      }
    }
    <div style="height:120px"></div>
  </div>
</div>
