<div class="tabs-shell">

  <!-- Page content -->
  <div class="tab-content">
    <router-outlet></router-outlet>
  </div>

  <!-- Mini player -->
  @if (playerStore.hasTrack()) {
    <div class="mini-slot">
      <app-mini-player (expand)="openPlayer()" />
    </div>
  }

  <!-- Bottom tab bar -->
  <nav class="tab-bar" role="tablist">

    <a class="tab-btn" routerLink="/tabs/home" routerLinkActive="tab-btn--active"
       role="tab" aria-label="Home">
      <svg class="tab-icon" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H5a1 1 0 01-1-1V9.5z"
              stroke="currentColor" stroke-width="1.8" fill="none" stroke-linejoin="round"/>
        <path d="M9 21V12h6v9" stroke="currentColor" stroke-width="1.8"
              fill="none" stroke-linejoin="round"/>
      </svg>
      <span class="tab-label">Home</span>
    </a>

    <a class="tab-btn" routerLink="/tabs/search" routerLinkActive="tab-btn--active"
       role="tab" aria-label="Search">
      <svg class="tab-icon" viewBox="0 0 24 24" aria-hidden="true">
        <circle cx="10.5" cy="10.5" r="6.5" stroke="currentColor" stroke-width="1.8" fill="none"/>
        <path d="M15.5 15.5L20 20" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <span class="tab-label">Search</span>
    </a>

    <a class="tab-btn" routerLink="/tabs/library" routerLinkActive="tab-btn--active"
       role="tab" aria-label="Library">
      <svg class="tab-icon" viewBox="0 0 24 24" aria-hidden="true">
        <rect x="3" y="3" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.8" fill="none"/>
        <rect x="14" y="3" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.8" fill="none"/>
        <rect x="3" y="14" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.8" fill="none"/>
        <rect x="14" y="14" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.8" fill="none"/>
      </svg>
      <span class="tab-label">Library</span>
    </a>

    <a class="tab-btn" routerLink="/tabs/settings" routerLinkActive="tab-btn--active"
       role="tab" aria-label="Settings">
      <svg class="tab-icon" viewBox="0 0 24 24" aria-hidden="true">
        <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.8" fill="none"/>
        <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"
              stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span class="tab-label">Settings</span>
    </a>

  </nav>
</div>

<!-- Full player modal -->
<ion-modal
  [isOpen]="playerStore.isFullPlayerOpen()"
  cssClass="full-player-modal"
  [canDismiss]="true"
  (didDismiss)="closePlayer()">
  <ng-template>
    <app-full-player (dismiss)="closePlayer()" />
  </ng-template>
</ion-modal>
