<div class="page">
  <div class="page-header">
    <h1 class="page-title">Settings</h1>
  </div>

  <div class="page-scroll">

    <div class="group">
      <p class="group-label">LIBRARY</p>
      <div class="group-card">
        <button class="setting-row" (click)="scanLibrary()">
          <span class="row-label">Scan Device Music</span>
          <span class="row-arrow">›</span>
        </button>
      </div>
    </div>

    <div class="group">
      <p class="group-label">PLAYBACK</p>
      <div class="group-card">
        <div class="setting-row">
          <span class="row-label">Gapless Playback</span>
          <label class="toggle">
            <input type="checkbox" [checked]="settings.gaplessPlayback()"
              (change)="onGaplessChange($event)" />
            <span class="slider"></span>
          </label>
        </div>
      </div>
    </div>

    <div class="group">
      <p class="group-label">APPEARANCE</p>
      <div class="group-card">
        <div class="setting-row">
          <span class="row-label">Dynamic Colors</span>
          <label class="toggle">
            <input type="checkbox" [checked]="settings.dynamicColor()"
              (change)="onDynamicColorChange($event)" />
            <span class="slider"></span>
          </label>
        </div>
      </div>
    </div>

    <div class="group">
      <p class="group-label">SYNC</p>
      <div class="group-card">
        <div class="setting-row">
          <span class="row-label">Wi-Fi only sync</span>
          <label class="toggle">
            <input type="checkbox" [checked]="settings.syncOnWifiOnly()"
              (change)="onSyncWifiChange($event)" />
            <span class="slider"></span>
          </label>
        </div>
      </div>
    </div>

    <div style="height: 120px"></div>
  </div>
</div>
